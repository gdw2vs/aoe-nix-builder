name: Push to Cachix

# Builds aoe-with-web (--features serve, web UI embedded) for Linux and macOS
# and pushes ALL store paths to Cachix so new hosts don't need to recompile.
#
# Triggers:
#   - Hourly schedule: checks for new upstream releases. Compares the latest
#     release commit to what's pinned in flake.lock; skips if already built.
#   - Manual dispatch: always builds (can optionally pin an upstream ref).
#
# State is tracked via flake.lock: after a successful build the ubuntu job
# commits the updated flake.lock so the next run can detect nothing is new.
# No PAT or repo variables needed.
#
# Requires two repository secrets:
#   CACHIX_AUTH_TOKEN  - from cachix.org (Settings > Auth Tokens)
#   CACHIX_CACHE_NAME  - your cache name (e.g. "gdw2vs")

on:
  schedule:
    - cron: '30 * * * *' # hourly at :30
  workflow_dispatch:
    inputs:
      upstream_ref:
        description: 'Upstream ref to build (tag, branch, or commit). Leave blank for latest release.'
        required: false
        default: ''
      force:
        description: 'Build even if flake.lock is already up to date'
        type: boolean
        default: false

jobs:
  check-release:
    name: Check for new upstream release
    runs-on: ubuntu-latest
    outputs:
      should_build: ${{ steps.check.outputs.should_build }}
      ref: ${{ steps.check.outputs.ref }}
      tag: ${{ steps.check.outputs.tag }}

    steps:
      - uses: actions/checkout@v4

      - name: Determine upstream ref
        id: check
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Manual dispatch with explicit ref: always build that ref.
          if [[ -n "${{ inputs.upstream_ref }}" ]]; then
            echo "ref=${{ inputs.upstream_ref }}" >> "$GITHUB_OUTPUT"
            echo "tag=${{ inputs.upstream_ref }}" >> "$GITHUB_OUTPUT"
            echo "should_build=true" >> "$GITHUB_OUTPUT"
            echo "Building manually requested ref: ${{ inputs.upstream_ref }}"
            exit 0
          fi

          # Get latest release tag and its commit SHA from upstream.
          RELEASE=$(gh api repos/njbrake/agent-of-empires/releases/latest 2>/dev/null || echo "")
          if [[ -z "$RELEASE" ]]; then
            echo "No upstream release found."
            echo "should_build=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          LATEST_TAG=$(echo "$RELEASE" | jq -r '.tag_name')
          LATEST_SHA=$(gh api "repos/njbrake/agent-of-empires/commits/$LATEST_TAG" --jq '.sha' 2>/dev/null || echo "")

          echo "Latest upstream release: $LATEST_TAG ($LATEST_SHA)"
          echo "ref=$LATEST_TAG" >> "$GITHUB_OUTPUT"
          echo "tag=$LATEST_TAG" >> "$GITHUB_OUTPUT"

          # Compare to what's currently pinned in flake.lock.
          LOCKED_SHA=$(jq -r '.nodes["agent-of-empires"].locked.rev // ""' flake.lock)
          echo "Currently pinned in flake.lock: ${LOCKED_SHA:-<none>}"

          if [[ "$LATEST_SHA" == "$LOCKED_SHA" && "${{ inputs.force }}" != "true" ]]; then
            echo "flake.lock is already pinned to $LATEST_TAG, skipping build."
            echo "should_build=false" >> "$GITHUB_OUTPUT"
          else
            echo "New release detected ($LATEST_TAG), will build."
            echo "should_build=true" >> "$GITHUB_OUTPUT"
          fi

  build:
    name: Build and push (${{ matrix.os }})
    needs: check-release
    if: needs.check-release.outputs.should_build == 'true'
    runs-on: ${{ matrix.os }}
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]

    steps:
      - uses: actions/checkout@v4

      - uses: nixbuild/nix-quick-install-action@2c9db80fb984ceb1bcaa77cdda3fdf8cfba92035 # v34

      - name: Pin upstream to release ref
        run: |
          REF="${{ needs.check-release.outputs.ref }}"
          echo "Pinning agent-of-empires input to ref: $REF"
          nix flake update --override-input agent-of-empires "github:njbrake/agent-of-empires/$REF" agent-of-empires

      # Must run BEFORE the build so the post-build hook captures every
      # derivation as it is built.
      - name: Set up Cachix
        uses: cachix/cachix-action@1eb2ef646ac0255473d23a5907ad7b04ce94065c # v17
        with:
          name: ${{ secrets.CACHIX_CACHE_NAME }}
          authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}

      - name: Build aoe-with-web
        run: nix build .#aoe-with-web

      - name: Push all build inputs and outputs to Cachix
        run: |
          CACHE="${{ secrets.CACHIX_CACHE_NAME }}"
          DRV=$(nix path-info --derivation .#aoe-with-web)

          # All inputs (build-time: crates, toolchain, npm, etc.)
          nix path-info -r "$DRV" | cachix push "$CACHE"

          # All outputs (runtime closure: the binary + its runtime deps)
          nix path-info -r ./result | cachix push "$CACHE"

      # Only commit from ubuntu to avoid a race between the two matrix jobs.
      - name: Commit updated flake.lock
        if: matrix.os == 'ubuntu-latest'
        run: |
          TAG="${{ needs.check-release.outputs.tag }}"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git add flake.lock
          if git diff --cached --quiet; then
            echo "flake.lock unchanged, nothing to commit."
          else
            git commit -m "chore: pin upstream to $TAG"
            for i in 1 2 3; do
              git pull --rebase origin main && git push && break
              echo "Push failed, retrying ($i/3)..."
              sleep 5
            done
          fi
